problem:
  ua: >
    У багатьох студіях запис ведеться через Direct, ціни надсилаються в
    особисті повідомлення, а інформація про майстрів губиться серед
    дописів і сторіс. Новій клієнтці складно швидко зрозуміти вартість і
    тривалість процедури та вибрати спеціаліста. Чим більше інформації
    потрібно уточнювати в повідомленнях, тим легше втратити клієнтку ще
    до запису.
  en: >
    In many studios booking happens through DMs, prices are sent in
    private messages, and information about the stylists gets lost among
    posts and stories. A new client struggles to quickly work out the
    price and length of a treatment or to choose a specialist. The more
    she has to clarify in messages, the easier it is to lose her before
    she books.

solution:
  ua: >
    Сайт збирає в одному місці послуги, актуальні ціни, тривалість
    процедур, профілі майстрів, їхній досвід і фотографії студії.
    Клієнтка може самостійно вибрати процедуру та спеціаліста й одразу
    перейти до онлайн-запису. Знижка на перший візит допомагає новій
    клієнтці легше зважитися на запис, а адміністратору доводиться рідше
    повторювати однакові відповіді в Direct.
  en: >
    The site gathers services, current prices, treatment durations,
    stylist profiles, their experience and photos of the studio in one
    place. A client can choose a treatment and a specialist herself and
    go straight to online booking. A first-visit discount makes it easier
    for a new client to decide, and the front desk repeats the same
    answers in DMs far less often.

result:
