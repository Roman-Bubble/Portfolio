problem:
  ua: >
    Класика ніші: запис через Direct, ціни «в особисті», майстрів видно
    лише в стрічці. Нова клієнтка не знає, скільки коштує процедура і до
    кого вона потрапить, тому йде туди, де все видно одразу.
  en: >
    The classic story in beauty: bookings through DMs, prices "sent
    privately", the stylists visible only in the feed. A new client can't
    see what a treatment costs or whose hands she'll end up in, so she
    goes where everything is visible upfront.

solution:
  ua: >
    Сторінка зібрана як журнальна редакція про студію: послуги з цінами
    і тривалістю, майстри з обличчями й досвідом, студія зсередини.
    Записатися можна онлайн у кілька дотиків, а знижка на перший візит
    забирає останній сумнів.
  en: >
    The page reads like a magazine feature about the studio: services
    with prices and duration, the artists shown by face and experience,
    the space itself. Booking takes a few taps online, and a first-visit
    discount removes the last bit of doubt.

