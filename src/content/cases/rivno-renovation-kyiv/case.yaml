problem:
  ua: >
    У ремонті головний бар'єр — недовіра. Клієнт боїться непередбаченого
    збільшення кошторису, затримок і відсутності відповідальності після
    отримання авансу. Через це рішення відкладають, довго порівнюють
    пропозиції та часто вибирають виконавця за рекомендацією, навіть не
    маючи чіткого розуміння умов роботи.
  en: >
    In renovation the main barrier is distrust. The client fears an
    unexpected jump in the estimate, delays and a lack of accountability
    once the deposit is paid. So decisions get postponed, offers are
    compared for a long time, and people often pick a contractor on a
    recommendation without a clear understanding of the terms.

solution:
  ua: >
    Сайт переводить розмову зі страхів на конкретні цифри й умови.
    Калькулятор формує попередній кошторис залежно від площі та рівня
    опорядження. Оплата розбита на етапи й відбувається після приймання
    кожного з них, а пеня за прострочення відкрито прописана на сторінці.
    Окрема таблиця порівнює роботу компанії за договором і поетапною
    оплатою з роботою приватної бригади. Ще до заявки клієнт розуміє
    бюджет, порядок роботи та відповідальність сторін.
  en: >
    The site shifts the conversation from fears to concrete numbers and
    terms. A calculator builds a preliminary estimate based on area and
    finish level. Payment is split into stages and happens after each one
    is accepted, and the late penalty is stated openly on the page. A
    separate table compares working with the company under a contract and
    staged payment against a private crew. Before sending a request, the
    client understands the budget, the order of work and each side's
    responsibilities.

