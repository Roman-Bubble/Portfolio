problem:
  ua: >
    У ремонті клієнт від початку чекає обману: кошторис виросте вдвічі,
    строки попливуть, бригада зникне з авансом. Тому рішення ухвалюють
    місяцями і шукають «по знайомству», а не за якістю роботи.
  en: >
    In renovation the client expects to be cheated from day one: the
    estimate doubles, deadlines slip, the crew vanishes with the advance.
    So decisions take months and people hire "a friend of a friend"
    instead of the best crew.

solution:
  ua: >
    Сайт побудований на цифрах і договорі: калькулятор рахує кошторис за
    площею і рівнем опорядження, оплата йде етапами після приймання
    кожного, пеня за прострочення прописана прямо на сторінці. Окрема
    таблиця чесно порівнює компанію з бригадою за оголошенням.
  en: >
    The site is built on numbers and a contract: a calculator prices the
    job by area and finish level, payment goes stage by stage after each
    one is accepted, and the late-penalty clause is printed right on the
    page. A comparison table honestly stacks the company against a
    classifieds crew.

result:
  ua: 'Калькулятор кошторису та заявка на замір.'
  en: 'A cost calculator and a request for a site survey.'

