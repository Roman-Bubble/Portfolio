problem:
  ua: >
    Ресторану з характером мало сторінки з меню і телефоном: гість обирає
    не страву, а вечір. Якщо сайт не передає атмосферу, вибір програється
    закладам з гарнішою стрічкою в Instagram.
  en: >
    A restaurant with character needs more than a menu and a phone
    number: guests choose an evening, not a dish. If the site doesn't
    carry the atmosphere, the booking goes to whoever has the prettier
    Instagram feed.

solution:
  ua: >
    Сайт веде гостя як дегустація: історія живого вогню, меню чотирма
    главами, шеф зі своєю філософією, зала в присмерку. Бронювання столу
    у два поля, дегустаційний сет підказує, з чого почати знайомство.
  en: >
    The site walks the guest through like a tasting: the story of live
    fire, a menu in four chapters, the chef and his philosophy, the dining
    room at dusk. Reserving a table takes two fields, and the tasting set
    suggests where to start.

