problem:
  ua: >
    Для ресторану з характером недостатньо показати лише меню й номер
    телефону. Перед бронюванням гість оцінює атмосферу, кухню, формат
    вечора та простір. Якщо сайт цього не передає, заклад може програти
    конкурентам, які переконливіше презентують себе онлайн.
  en: >
    For a restaurant with character, a menu and a phone number aren't
    enough. Before booking, a guest weighs the atmosphere, the food, the
    format of the evening and the space. If the site doesn't convey this,
    the venue can lose out to competitors who present themselves more
    convincingly online.

solution:
  ua: >
    Сайт послідовно знайомить гостя з концепцією ресторану: історією
    живого вогню, меню з чотирьох глав, філософією шефа й атмосферою
    залу. Дегустаційний сет допомагає новому гостю зрозуміти, з чого
    почати знайомство з кухнею. Форма бронювання складається лише з двох
    полів, тому гість може одразу перейти до бронювання, не шукаючи
    контакти на інших сторінках.
  en: >
    The site walks the guest through the restaurant's concept step by
    step: the story of live fire, a menu in four chapters, the chef's
    philosophy and the mood of the dining room. A tasting set helps a new
    guest figure out where to start. The booking form has just two
    fields, so a guest can reserve right away without hunting for contacts
    on other pages.

