problem:
  ua: >
    Детейлінг продає не просто блиск автомобіля, а професійний захист,
    результат якого клієнту складно оцінити до замовлення. Коли один
    пакет коштує 15 тисяч, а інший 35 тисяч, половина звернень зводиться
    до питань про ціну та різницю між послугами. Власнику доводиться
    щодня повторювати ті самі пояснення, а частина клієнтів іде, так і
    не зрозумівши цінність пропозиції.
  en: >
    Detailing sells more than a shiny car — it sells professional
    protection whose value is hard to judge before booking. When one
    package is 15 thousand and another 35, half the inquiries come down
    to questions about price and the difference between services. The
    owner ends up repeating the same explanations every day, and some
    customers leave without ever understanding what they'd be paying for.

solution:
  ua: >
    Сайт бере основні пояснення на себе. Калькулятор показує вартість
    залежно від розміру авто та пакета, а поруч зрозуміло пояснено склад
    послуги й різницю між варіантами. Письмова гарантія на 5 років додає
    впевненості перед дорогим замовленням, слайдер «до/після» демонструє
    результат, а забронювати час можна приблизно за хвилину. У месенджер
    клієнт переходить уже з розумінням вартості, вибраного пакета та
    того, як записатися.
  en: >
    The site takes the main explaining off the owner's hands. A
    calculator shows the price by car size and package, with a clear
    breakdown of what each service includes and how the options differ.
    A written 5-year warranty adds confidence before an expensive job, a
    before/after slider shows the result, and booking a slot takes about
    a minute. By the time a customer opens the messenger, they already
    understand the price, the package they want and how to book.

