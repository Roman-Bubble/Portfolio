problem:
  ua: >
    Люди часто відкладають лікування через страх болю, невідомий бюджет
    і недовіру до лікаря. Типовий сайт із переліком процедур не
    відповідає на головні запитання: хто лікуватиме, як проходитиме
    прийом і скільки коштуватиме лікування.
  en: >
    People often put off treatment out of fear of pain, an unknown budget
    and distrust of the dentist. A typical site with a list of procedures
    answers none of the real questions: who will treat you, how the visit
    will go, and what the treatment will cost.

solution:
  ua: >
    Сайт відповідає на основні запитання ще до першого дзвінка. На сайті
    просто пояснено, як клініка зменшує дискомфорт під час лікування,
    ціни доступні до запису, а план лікування показує погоджену
    вартість, яка не змінюється без попереднього узгодження з пацієнтом.
    Окремо представлені лікарі, їхній досвід і спеціалізація. Перший крок
    максимально простий: безкоштовний огляд і план лікування без
    зобовʼязань.
  en: >
    The site answers the main questions before the first call. It
    explains plainly how the clinic reduces discomfort during treatment,
    prices are available before booking, and the treatment plan shows an
    agreed cost that doesn't change without discussing it with the patient
    first. The doctors, their experience and specialisation are shown
    separately. The first step is as easy as possible: a free check-up and
    treatment plan, no obligations.

