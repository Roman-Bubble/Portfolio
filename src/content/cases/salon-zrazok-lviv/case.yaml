problem:
  ua: |
    Увесь запис ішов через Instagram: людина писала в Direct, чекала
    відповіді, губилась. Вечорами Віра відповідала на повідомлення
    замість відпочивати, а половина тих, хто питав ціну, просто зникала.
  en: |
    Every booking went through Instagram: a customer wrote a DM, waited
    for a reply, drifted away. Vira spent her evenings answering messages
    instead of resting, and half the people who asked for a price simply
    vanished.

solution:
  ua: |
    Сайт забрав на себе всі питання, які зʼїдали вечори: послуги
    та ціни видно одразу, майстрів видно в обличчя, записатися можна
    самій, без листування. Instagram лишився для краси, а запис
    переїхав на сайт.
  en: |
    The site took over every question that used to eat the evenings:
    services and prices visible upfront, the stylists shown by face,
    self-booking with no back-and-forth. Instagram stayed for the pretty
    pictures; the bookings moved to the site.

result:
  ua: 'Ціль сайта: клієнтка записується сама, без листування в Direct'
  en: 'The goal of the site: clients book themselves, no DM back-and-forth'

