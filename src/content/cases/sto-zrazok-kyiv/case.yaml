problem:
  ua: |
    Клієнти приходили тільки за рекомендаціями, і потік був нерівний:
    то черга, то порожні підйомники серед тижня. В Google людина шукала
    «ремонт ходової Київ» і знаходила конкурентів, бо СТО в інтернеті
    просто не існувало.
  en: |
    Customers came by word of mouth only, and the flow was uneven:
    a queue one week, empty lifts the next. When someone searched
    "suspension repair Kyiv", they found competitors. The shop simply
    did not exist online.

solution:
  ua: |
    Ми поговорили з Андрієм і його майстрами й знайшли головне: людям
    страшно, що на СТО «розведуть». Тому сайт побудований на прозорості.
    Ціни на типові роботи одразу, фото майстрів і боксу, чесний опис,
    як проходить діагностика. Записатися можна в один дотик: дзвінок
    або Telegram.
  en: |
    After talking with Andrii and his mechanics, the key insight was fear:
    people expect a repair shop to overcharge them. So the site is built on
    transparency. Upfront prices for common jobs, photos of the real
    mechanics and the garage, an honest walkthrough of the diagnostics.
    Booking takes one tap: a call or a Telegram message.

result:
